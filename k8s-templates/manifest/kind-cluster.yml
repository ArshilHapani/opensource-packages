# needs to create kind cluster with following config to access 30000 port publicly
# kind create cluster --config kind-cluster.yml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # - containerPort: 30000
      #   hostPort: 30000
      - containerPort: 80
        hostPort: 80
      - containerPort: 443
        hostPort: 443
