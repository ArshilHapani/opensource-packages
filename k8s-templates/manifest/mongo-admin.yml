apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-admin
  labels:
    app: mongo-admin

spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-admin
  template:
    metadata:
      labels:
        app: mongo-admin
    spec:
      containers:
        - name: mongo-admin
          image: mongo-express:1.0.2-20-alpine3.19

          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_MONGODB_ADMINUSERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongo-db-username

            - name: ME_CONFIG_MONGODB_ADMINPASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongo-db-password
            - name: ME_CONFIG_BASICAUTH_USERNAME
              value: arshil
            - name: ME_CONFIG_BASICAUTH_PASSWORD
              value: arshil

            - name: ME_CONFIG_MONGODB_SERVER
              valueFrom:
                configMapKeyRef:
                  name: mongodb-configmap
                  key: database-url

            - name: MONGODB_URI_NOT_USED_JUST_TO_DEMONSTRATE_URL_CONSTRUCTION
              value: "mongodb://$(MONGODB_USERNAME):$(MONGODB_PASSWORD)@mongo-service:27017/test?authSource=admin"

---
apiVersion: v1
kind: Service

metadata:
  name: mongo-admin-service

spec:
  selector:
    app: mongo-admin

  # type: LoadBalancer # default is ClusterIP, type LoadBalancer is used for testing only in prod use ingress controller

  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      # nodePort: 30000
